name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.1.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Run CI checks
        run: bun run ci
      
      - name: Run typecheck
        run: bun run typecheck
      
      - name: Run tests
        run: bun test
      
      - name: Update package.json
        run: |
          jq '.version = "${{ github.event.inputs.version }}"' package.json > package.json.tmp
          mv package.json.tmp package.json
      
      - name: Update src/index.ts
        run: |
          sed -i "s/version: '[0-9]\+\.[0-9]\+\.[0-9]\+'/version: '${{ github.event.inputs.version }}'/" src/index.ts
      
      - name: Update README.md with version tag
        run: |
          sed -i 's|"args": \["github:mikedfunk/habitica-mcp-server"\]|"args": ["github:mikedfunk/habitica-mcp-server#v${{ github.event.inputs.version }}"]|g' README.md

      - name: Update README.zh-CN.md with version tag
        run: |
          sed -i 's|"args": \["github:mikedfunk/habitica-mcp-server"\]|"args": ["github:mikedfunk/habitica-mcp-server#v${{ github.event.inputs.version }}"]|g' README.zh-CN.md

      - name: Commit version bump
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add package.json src/index.ts README.md README.zh-CN.md
          git commit -m "chore: release v${{ github.event.inputs.version }}"
          git push
      
      - name: Create tag
        run: |
          git tag v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}
      
      - name: Create GitHub Release
        run: |
          gh release create v${{ github.event.inputs.version }} \
            --title "Release v${{ github.event.inputs.version }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
