name: Build
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Run tests with coverage
        run: |
          bunx c8 --reporter=lcov --reporter=text --all --src=src bun test
          echo "Coverage files generated:"
          ls -la coverage/ 2>/dev/null || echo "No coverage directory found"
          echo "Checking for lcov.info..."
          find . -name "lcov.info" -type f 2>/dev/null | head -5
        continue-on-error: true
      - name: Check coverage file
        run: |
          ls -la coverage/ || echo "No coverage directory"
          cat coverage/lcov.info | head -20 || echo "No lcov.info file"
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
